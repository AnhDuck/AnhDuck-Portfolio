<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | AnhDuck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="contact-body">
    <main class="contact-wrap">
      <div class="contact-top container">
        <a class="mini-logo" href="index.html">AD</a>
        <a class="close-x" href="index.html">✕</a>
      </div>
      <section class="contact-form container">
        <h1>Let's work together.</h1>
        <p>Ne duo euismod appetere argumentum, qui cetero oportere partiendo.</p>
        <form>
          <label>What is your name?</label>
          <div class="row">
            <input placeholder="First Name" /><input placeholder="Last Name" />
          </div>
          <label>What is your email?</label>
          <input placeholder="Email Address" />
          <label>Description of your project.</label>
          <textarea placeholder="Project details"></textarea>
          <button class="btn btn-outline" type="button">Submit Inquiry <span>›</span></button>
        </form>
      </section>
    </main>
  </body>
</html>
